aid: fifth-third-bancorp
name: Fifth Third Bancorp
kind: company
description: >-
  Fifth Third Bancorp is a diversified super-regional financial services company
  providing commercial banking, branch banking, consumer lending, and wealth and
  asset management services across multiple U.S. states. Its embedded-finance
  arm, Newline by Fifth Third (built on the 2023 Rize Money acquisition),
  operates a documented, API-first Banking-as-a-Service platform: the Newline
  Platform API exposes payments (ACH, wire, Real-Time Payments/RTP, book
  transfers), FDIC-insured deposit and custodial accounts, synthetic accounts,
  virtual reference numbers, card issuing, customer/KYC onboarding, transactions,
  returns, and webhook/message-queue notifications so fintechs and enterprises
  can embed financial products directly with Fifth Third Bank.
