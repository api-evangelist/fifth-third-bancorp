generated: '2026-07-23'
method: searched
status: published
source: https://github.com/newline53/newline-mcp-server
docs: https://developers.newline53.com/docs/mcp-guide
server:
  name: newline
  transport: stdio
  command: npx
  args:
    - -y
    - git+https://github.com/newline53/newline-mcp-server
  env:
    - NEWLINE_HMAC_KEY
    - NEWLINE_PROGRAM_ID
    - NEWLINE_BASE_URL
  base_url_default: https://sandbox.newline53.com/api/v1
  auth: JWS/HMAC (credentials held server-side; agents call permissioned tools)
  clients:
    - Claude Desktop
    - VS Code
    - Cursor
    - Windsurf
notes: >-
  Official Newline MCP server exposing the Newline Banking API to AI agents.
  Distributed from the newline53 GitHub org and run locally over stdio via npx.
  34 tools cover customers, products, pools, synthetic/custodial accounts and
  line items, transfers, combined transfers, transactions and events, returns,
  and virtual reference numbers. The surface is read-heavy (list/get) plus three
  write tools (create-newline-transfer, create-synthetic-account,
  delete-synthetic-accounts). Live tools/list requires the stdio server with
  HMAC credentials; tool names below are read verbatim from the server source.
tools:
