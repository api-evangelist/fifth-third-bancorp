  OpenAPI declares no operationIds, so REST operations are referenced by method +
  path (verified verbatim in the spec). The MCP surface is read-heavy: it exposes
  list/get across every resource plus three write tools, and omits most REST
  writes (customer create/update/archive, transfer cancel, transaction authorize,
  VRN lifecycle, returns create, mock transactions). Two MCP tools
  (customer-activities) have no public REST operation in the OpenAPI.
